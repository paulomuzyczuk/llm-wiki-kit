name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.15.18

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: ShellCheck
        # shellcheck ships preinstalled on ubuntu-latest runners.
        run: shellcheck install.sh new-vault.sh */regenerate-clones.sh

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks scans the PR commit range, so it needs full history —
          # a shallow clone makes the base commit unreachable and the scan errors.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit==1.9.4

      - name: Bandit (Python SAST, gate on medium+ severity)
        # The tools are dependency-free stdlib; low-severity findings (defensive
        # try/except, the 'PASS' dict-key false positive) are noise here, so the
        # build fails only on medium-or-higher severity issues.
        run: bandit -r check-conformance vault-lint -x '*/tests/*' --severity-level medium

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Conformance test suite
        run: python3 -m pytest -q check-conformance/tests/

      - name: Vault-lint test suite
        run: python3 -m pytest -q vault-lint/tests/

      - name: Example vault lints clean
        # The populated example (examples/software-craft) is a showcase of real
        # output; it must stay lint-clean. Assert zero *gating* findings so drift
        # in the example pages, citations, or vocabulary fails the build. Check 4
        # cross-reference suggestions are advisory (a populated vault always has
        # some) and are excluded from the gating total. lint.py always exits 0
        # (report-only), so we assert on the summary line.
        run: |
          out=$(python3 vault-lint/lint.py examples/software-craft)
          echo "$out"
          echo "$out" | grep -qE 'Gating findings: +0 ' \
            || { echo "::error::examples/software-craft has gating vault-lint findings"; exit 1; }

      - name: Scaffolder round-trip smoke test
        # A freshly scaffolded vault must pass the conformance checker with exit 0.
        # This guards the template/subs/scaffolder against the kind of drift the
        # lint-path and token-set fixes addressed.
        run: |
          ./new-vault.sh --subs check-conformance/subs/software-craft.json --dest "$RUNNER_TEMP/ci-vault"
          python3 check-conformance/check-conformance.py \
            --vault "$RUNNER_TEMP/ci-vault/CLAUDE.md" \
            --template CLAUDE.template.md \
            --subs check-conformance/subs/software-craft.json

      - name: Scaffolded CLAUDE.md is clean (header fully stripped, all tokens substituted)
        # Independent of the conformance diff: that check shares the header-strip
        # logic, so if the strip ever regresses the leaked header cancels on both
        # sides and conformance stays green (the bug this guards against). Assert
        # the contract directly — it must start at the real title, carry none of
        # the instantiation header's unique prose, and have no unsubstituted
        # {{TOKEN}}. (Sanctioned-region markers like <!-- VAULT-LINT-EXTENSIONS-...
        # --> legitimately remain in the body, so we do NOT blanket-reject '<!--'.)
        run: |
          claude="$RUNNER_TEMP/ci-vault/CLAUDE.md"
          head -1 "$claude" | grep -qx '# Vault Schema — software craft Knowledge Wiki' \
            || { echo "FAIL: CLAUDE.md does not start with the contract title"; head -5 "$claude"; exit 1; }
          ! grep -qE 'INSTANTIATION HEADER|FOLDER STRUCTURE TO CREATE|delete after substitution' "$claude" \
            || { echo "FAIL: leftover instantiation-header prose in CLAUDE.md"; grep -nE 'INSTANTIATION HEADER|FOLDER STRUCTURE TO CREATE' "$claude" | head; exit 1; }
          ! grep -qE '\{\{[^}]+\}\}' "$claude" \
            || { echo "FAIL: unsubstituted token(s) in CLAUDE.md"; grep -nE '\{\{[^}]+\}\}' "$claude" | head; exit 1; }
          # Provenance seed must contain a real em dash, not a literal escape (F7).
          ! grep -q '\\x' "$RUNNER_TEMP/ci-vault/claude/_provenance.md" \
            || { echo "FAIL: literal escape bytes in seeded _provenance.md"; cat "$RUNNER_TEMP/ci-vault/claude/_provenance.md"; exit 1; }
          echo "OK: scaffolded CLAUDE.md is clean."
